name: Sync to Hugging Face Space

# Mirrors this repo to the MediaPulse Hugging Face Space on every push
# to main. The Space is a Docker SDK space that rebuilds the image
# automatically when new commits land.
#
# Required secrets (set in Settings → Secrets and variables → Actions):
#   HF_TOKEN      — a Hugging Face access token with write permission
#                   https://huggingface.co/settings/tokens
#   HF_USERNAME   — your HF username (e.g. "akshargupta")
#   HF_SPACE      — the Space name (e.g. "mediapulse")

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE: ${{ secrets.HF_SPACE }}
        run: |
          set -euo pipefail
          if [ -z "${HF_TOKEN:-}" ] || [ -z "${HF_USERNAME:-}" ] || [ -z "${HF_SPACE:-}" ]; then
            echo "Missing one of HF_TOKEN / HF_USERNAME / HF_SPACE secrets." >&2
            exit 1
          fi

          git config user.email "actions@github.com"
          git config user.name  "github-actions[bot]"

          REMOTE="https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE}"
          git remote add hf "${REMOTE}" 2>/dev/null || git remote set-url hf "${REMOTE}"

          # Force-push so the Space mirror always matches main exactly.
          # (The Space repo is treated as an output, not a source of truth.)
          git push --force hf HEAD:main
